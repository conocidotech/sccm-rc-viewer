name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Match the local toolchain: x86_64-pc-windows-gnu + a recent MinGW-w64.
      # The `windows` crate's gnu target needs a working dlltool to generate
      # import libraries, which the stock rustup-bundled one lacks (see env.ps1).
      # Provide MinGW-w64 (gcc + dlltool) for the gnu target. We avoid the
      # egor-tensin/setup-mingw action because its hardcoded post-install pthread
      # cleanup breaks on the current Chocolatey mingw layout. Instead, locate an
      # existing toolchain on the runner; if none, `choco install mingw` (the
      # install itself works fine — only the action's cleanup was broken).
      - name: Ensure MinGW-w64 on PATH
        shell: pwsh
        run: |
          $candidates = @(
            "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin",
            "C:\msys64\mingw64\bin",
            "C:\msys64\ucrt64\bin",
            "C:\mingw64\bin"
          )
          $bin = $candidates | Where-Object { Test-Path "$_\gcc.exe" } | Select-Object -First 1
          if (-not $bin) {
            Write-Host "No MinGW found; installing via choco..."
            choco install mingw -y --no-progress | Out-Null
            $bin = "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin"
          }
          if (-not (Test-Path "$bin\gcc.exe")) { throw "no gcc.exe found; searched: $($candidates -join ', ')" }
          Write-Host "Using MinGW at $bin"
          Add-Content -Path $env:GITHUB_PATH -Value $bin
          & "$bin\gcc.exe" --version
          & "$bin\dlltool.exe" --version

      - name: Install Rust (gnu host) + components
        shell: pwsh
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu --profile minimal
          rustup default stable-x86_64-pc-windows-gnu
          rustup component add rustfmt clippy
          rustc -V
          cargo -V

      - uses: Swatinem/rust-cache@v2

      # Gating checks: the build must succeed and the test suite must pass.
      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      # Advisory checks: the codebase predates fmt/clippy gating. These run for
      # visibility but do not fail the build yet (see the cleanup follow-up).
      - name: Format check (advisory)
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Clippy (advisory)
        run: cargo clippy --workspace --all-targets
        continue-on-error: true
