name: Bug report
description: Report a problem with the sccm-rc viewer, protocol, or diagnostics
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please **do not include real hostnames, IPs, or any
        captured session content** — use placeholders. For security vulnerabilities,
        use the Security tab instead (see SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I connect to a target, the toolbar shows ... but I expected ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `sccm-rc-viewer TARGET-HOST ...`
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Run with `RUST_LOG=debug` and paste the relevant output (redact any hostnames/IPs).
      render: shell
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `sccm-rc-viewer --version` (package version + git hash).
      placeholder: 0.9.0 (abcdef0)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2
